<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>PDF Clipper</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+JP:wght@400;500&display=swap');

    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --border:       #21262d;
      --accent:       #2563eb;
      --accent-hover: #3b82f6;
      --accent-dim:   rgba(37, 99, 235, 0.15);
      --accent-muted: rgba(37, 99, 235, 0.4);
      --text:         #e6edf3;
      --muted:        #5a6a7e;
      --error:        #f87171;
      --success:      #34d399;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      overflow: hidden;
      position: relative;
    }

    .header {
      padding: 13px 16px 11px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      background: linear-gradient(160deg, #0d1f3c 0%, #0d1117 100%);
    }

    .logo {
      width: 30px; height: 30px;
      background: var(--accent);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(37,99,235,0.45);
    }

    .title {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600; font-size: 14px; letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 10px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace; margin-top: 1px;
    }

    .body {
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 11px;
    }

    .url-display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .url-display.is-pdf  { color: #93c5fd; border-color: var(--accent-muted); background: rgba(37,99,235,0.06); }
    .url-display.not-pdf { color: var(--error); border-color: rgba(248,113,113,0.35); }

    label {
      font-size: 10px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      display: block; margin-bottom: 6px;
      letter-spacing: 0.6px; text-transform: uppercase;
    }

    .page-row {
      display: grid; grid-template-columns: 1fr 22px 1fr; align-items: center;
    }

    .separator { text-align: center; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 14px; }

    input[type="number"] {
      width: 100%;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 9px 10px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px; font-weight: 600; text-align: center;
      outline: none;
      transition: border-color 0.12s, box-shadow 0.12s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .info-row { display: flex; justify-content: space-between; align-items: center; }

    .info-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); }
    .info-badge span { color: #7dd3fc; }

    /* progress bar */
    .progress-wrap {
      height: 3px; background: var(--border); border-radius: 2px;
      overflow: hidden; display: none;
    }
    .progress-wrap.show { display: block; }
    .progress-bar {
      height: 100%; width: 0%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.2s ease;
    }

    .status {
      padding: 8px 10px; border-radius: 6px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      display: none; align-items: flex-start; gap: 7px; line-height: 1.5;
    }
    .status.show { display: flex; }
    .status.success { background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.25); color: var(--success); }
    .status.error   { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25); color: var(--error); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; margin-top: 4px; }

    .btn {
      width: 100%; padding: 11px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600; font-size: 13px;
      cursor: pointer; letter-spacing: 0.2px;
      transition: background 0.12s, transform 0.08s, box-shadow 0.12s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 2px 10px rgba(37,99,235,0.35);
      outline: none;
    }
    .btn:focus-visible {
      box-shadow: 0 0 0 3px var(--accent-dim), 0 2px 10px rgba(37,99,235,0.35);
      outline: 2px solid var(--accent); outline-offset: 2px;
    }
    .btn:hover:not(:disabled) { background: var(--accent-hover); box-shadow: 0 3px 16px rgba(37,99,235,0.5); }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.28; cursor: not-allowed; box-shadow: none; }
    .btn.loading  { background: var(--surface); color: var(--text); border: 1px solid var(--border); box-shadow: none; }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.2); border-top-color: currentColor;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      padding: 8px 16px; border-top: 1px solid var(--border);
      font-size: 10px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      display: flex; justify-content: space-between;
    }

    .overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(13,17,23,0.82);
      flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted); gap: 8px;
      backdrop-filter: blur(2px);
    }
    .overlay.show { display: flex; }

    .hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--muted); text-align: center; opacity: 0.65;
    }
    kbd {
      display: inline-block; padding: 1px 5px;
      border: 1px solid var(--border); border-radius: 3px;
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: #7dd3fc; background: var(--surface);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
        <path d="M3 2.5C3 1.67 3.67 1 4.5 1H10l4 4v9.5c0 .83-.67 1.5-1.5 1.5h-8C3.67 16 3 15.33 3 14.5V2.5z" fill="white" opacity="0.18"/>
        <path d="M10 1l4 4h-3c-.55 0-1-.45-1-1V1z" fill="white" opacity="0.45"/>
        <circle cx="5.5" cy="12" r="1.6" fill="white" opacity="0.95"/>
        <circle cx="11.5" cy="12" r="1.6" fill="white" opacity="0.95"/>
        <path d="M5.5 10.4L11.5 7.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
        <path d="M5.5 13.6L11.5 16.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="title">PDF Clipper</div>
      <div class="subtitle">page range → PNG</div>
    </div>
  </div>

  <div class="body">
    <div id="urlDisplay" class="url-display">検出中...</div>

    <div>
      <label>ページ範囲</label>
      <div class="page-row">
        <input type="number" id="startPage" min="1" value="1" tabindex="1">
        <div class="separator">–</div>
        <input type="number" id="endPage" min="1" value="1" tabindex="2">
      </div>
    </div>

    <div class="info-row">
      <div class="info-badge" id="pageCount">総ページ: <span>—</span></div>
      <div class="info-badge" id="selectionInfo">選択: <span>—</span></div>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="status" class="status">
      <div class="status-dot"></div>
      <span id="statusText"></span>
    </div>

    <button class="btn" id="clipBtn" disabled tabindex="3">
      <span id="btnText">PNG でコピー [Enter]</span>
    </button>

    <div class="hint"><kbd>Tab</kbd> で移動 &nbsp;·&nbsp; <kbd>Enter</kbd> で実行</div>
  </div>

  <div class="footer">
    <span>PNG / clipboard</span>
    <span id="sizeEstimate">—</span>
  </div>

  <div class="overlay" id="overlay">
    <div class="spinner" style="border-color:rgba(37,99,235,0.2);border-top-color:var(--accent)"></div>
    <span id="overlayText">PDF読み込み中...</span>
  </div>

  <script src="pdf.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
